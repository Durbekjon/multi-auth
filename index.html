<!DOCTYPE html>
<html lang="uz">
  <head>
    <title>Authentication Methods</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="./assets/packs/css/bootstrap.min.css" rel="stylesheet" />
    <link href="./assets/style/styles.css" rel="stylesheet" />
    <link href="./assets/packs/css/font.css" rel="stylesheet" />
    <script src="./assets/packs/js/jsQR.js"></script>
    <script src="./assets/packs/js/face-api.js"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .theme-toggle {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 10px;
        border-radius: 50%;
        transition: all 0.3s ease;
        width: 50px;
        height: 50px;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
        background: rgba(0, 0, 0, 0.1);
      }

      .dark-mode .theme-toggle {
        color: var(--text-color-dark);
      }

      .auth-card {
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }

      .auth-icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
        background: linear-gradient(45deg, var(--accent-color-light), #00b894);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .dark-mode .auth-icon {
        background: linear-gradient(45deg, var(--accent-color-dark), #00b894);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .card-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      .card-text {
        font-size: 1rem;
        opacity: 0.8;
      }

      .container {
        max-width: 1200px;
        padding: 2rem;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 3rem;
        background: linear-gradient(45deg, var(--accent-color-light), #00b894);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .dark-mode h1 {
        background: linear-gradient(45deg, var(--accent-color-dark), #00b894);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body class="py-5">
    <button class="theme-toggle" id="themeToggle">🌓</button>

    <div class="container">
      <h1 class="text-center mb-5 fw-bold fade-in">
        Autentifikatsiya Usullari
      </h1>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="row">
            <div class="col-md-6 mb-4">
              <a href="faceid.html" class="text-decoration-none">
                <div
                  class="card auth-card shadow-lg fade-in"
                  style="animation-delay: 0.2s"
                >
                  <div class="card-body p-4 text-center">
                    <div class="auth-icon">👤</div>
                    <h2 class="card-title text">FaceID</h2>
                    <p class="card-text text">Yuz orqali autentifikatsiya</p>
                  </div>
                </div>
              </a>
            </div>
            <div class="col-md-6 mb-4">
              <a href="qrcode.html" class="text-decoration-none">
                <div
                  class="card auth-card shadow-lg fade-in"
                  style="animation-delay: 0.4s"
                >
                  <div class="card-body p-4 text-center">
                    <div class="auth-icon">📱</div>
                    <h2 class="card-title text">QR Kod</h2>
                    <p class="card-text text">QR kod orqali autentifikatsiya</p>
                  </div>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./assets/packs/js/bootstrap.bundle.min.js"></script>
    <script>
      // Dark mode toggle
      const themeToggle = document.getElementById("themeToggle");
      const body = document.body;

      // Check for saved theme preference
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        body.classList.add("dark-mode");
        themeToggle.textContent = "🌙";
        for (
          let i = 0;
          i < document.getElementsByClassName("text").length;
          i++
        ) {
          document.getElementsByClassName("text")[i].style.color = "white";
        }
      }

      themeToggle.addEventListener("click", () => {
        body.classList.toggle("dark-mode");
        if (body.classList.contains("dark-mode")) {
          console.log(document.getElementsByClassName("text"));
          for (
            let i = 0;
            i < document.getElementsByClassName("text").length;
            i++
          ) {
            document.getElementsByClassName("text")[i].style.color = "white";
          }
          themeToggle.textContent = "🌙";
          localStorage.setItem("theme", "dark");
        } else {
          for (
            let i = 0;
            i < document.getElementsByClassName("text").length;
            i++
          ) {
            document.getElementsByClassName("text")[i].style.color = "black";
          }
          themeToggle.textContent = "🌓";
          localStorage.setItem("theme", "light");
        }
      });
    </script>
  </body>
</html>
