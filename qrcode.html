<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Scanner</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
      body {
        background-color: #121212;
        color: white;
        text-align: center;
        font-family: Arial, sans-serif;
      }
      .container {
        margin-top: 50px;
        padding: 20px;
      }
      .qr-box {
        padding: 20px;
        background: #1e1e1e;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      #reader {
        width: 100%;
        max-width: 400px;
        margin: 20px auto;
        border-radius: 10px;
        overflow: hidden;
      }
      #reader video {
        border-radius: 10px;
      }
      .btn {
        margin: 5px;
        padding: 10px 20px;
      }
      #qr-result {
        margin-top: 15px;
        padding: 10px;
        border-radius: 5px;
        background-color: rgba(255, 255, 255, 0.1);
      }
      .success {
        color: #28a745;
      }
      .error {
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="mb-4">QR Code Scanner</h1>

      <!-- QR Code Scanner -->
      <div class="qr-box">
        <h3 class="mb-3">QR Kodni Skanerlash</h3>
        <div>
          <button id="startButton" class="btn btn-success">
            Kamerani Yoqish
          </button>
          <button id="stopButton" class="btn btn-danger" style="display: none">
            To'xtatish
          </button>
        </div>
        <div id="reader"></div>
        <div id="qr-result" style="display: none"></div>
      </div>
    </div>

    <script src="assets/js/qr-code.js"></script>
  </body>
</html>
